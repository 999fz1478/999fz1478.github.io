# ===============
# Header
# ===============
menu:
  Home: /
  Archives: /archives

rss: /atom.xml
banner: "images/banner.jpg"
subtitle: "把灵感、记录与日更内容沉淀成可回看的长期作品"

links:
#  github: https://github.com/your_github_account

# ===============
# Content
# ===============
excerpt_link: 继续阅读
fancybox: true

# ===============
# Footer
# ===============
